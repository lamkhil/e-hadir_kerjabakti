<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Absensi Kerja Bakti 6 Maret 2026</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

    <style>
        .fade-in {
            animation: fadeIn .6s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>

</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-lg fade-in">

        <div class="text-center mb-6">

            <img src="logo.png" class="h-16 mx-auto mb-3">

            <h1 class="text-2xl font-bold text-gray-800">
                Absensi Kerja Bakti 6 Maret 2026
            </h1>

            <p class="text-gray-500 text-sm">
                Pastikan wajah terlihat jelas
            </p>

        </div>

        <form id="formAbsensi" class="space-y-4">

            <input type="hidden" name="lat">
            <input type="hidden" name="lng">
            <input type="hidden" name="accuracy">

            <div>
                <label class="text-sm font-medium">Nama</label>
                <input type="text" name="nama" class="w-full p-3 border rounded-lg" required>
            </div>

            <div>
                <label class="text-sm font-medium">NIK / NIP</label>
                <input type="text" name="nik" class="w-full p-3 border rounded-lg" required>
            </div>

            <div class="text-sm text-gray-500">
                📍 Lokasi: <span id="lokasiText">Mendeteksi...</span>
            </div>

            <div class="text-center">

                <video id="video" autoplay muted playsinline
                    class="rounded-xl border shadow w-full max-h-64 object-cover">
                </video>

                <canvas id="canvas" class="hidden"></canvas>

                <img id="preview" class="hidden rounded-xl border shadow w-full mt-3">

                <div id="faceStatus" class="text-sm mt-2 text-red-500">
                    Mendeteksi wajah...
                </div>

                <button type="button" id="ambilFoto"
                    class="mt-3 bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">
                    📸 Ambil Foto
                </button>

            </div>

            <button type="submit"
                class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700 font-semibold">
                Kirim Absensi
            </button>

        </form>

    </div>

    <script>

        let fotoBase64 = null
        let latitude = null
        let longitude = null
        let accuracy = null
        let faceDetected = false

        const video = document.getElementById('video')
        const canvas = document.getElementById('canvas')
        const preview = document.getElementById('preview')
        const ctx = canvas.getContext('2d')


        /* =========================
        LOAD FACE MODEL
        ========================= */

        async function loadModels() {

            await faceapi.nets.tinyFaceDetector.loadFromUri('/weights')

        }

        loadModels()


        /* =========================
        AKSES KAMERA
        ========================= */

        navigator.mediaDevices.getUserMedia({

            video: {
                facingMode: "user"
            }

        }).then(stream => {

            video.srcObject = stream

        })

            .catch(() => {
                alert("Kamera tidak dapat diakses")
            })


        /* =========================
        DETEKSI WAJAH
        ========================= */

        video.addEventListener('play', () => {

            setInterval(async () => {

                const result = await faceapi.detectAllFaces(
                    video,
                    new faceapi.TinyFaceDetectorOptions()
                )

                if (result.length > 0) {

                    faceDetected = true

                    $('#faceStatus')
                        .text("✔ Wajah terdeteksi")
                        .css("color", "green")

                } else {

                    faceDetected = false

                    $('#faceStatus')
                        .text("❌ Tidak ada wajah")
                        .css("color", "red")

                }

            }, 800)

        })


        /* =========================
        GPS LOKASI
        ========================= */

        navigator.geolocation.getCurrentPosition(

            function (pos) {

                latitude = pos.coords.latitude
                longitude = pos.coords.longitude
                accuracy = pos.coords.accuracy

                $('input[name=lat]').val(latitude)
                $('input[name=lng]').val(longitude)
                $('input[name=accuracy]').val(accuracy)

                $('#lokasiText').text(
                    latitude + " , " + longitude + " (±" + accuracy + "m)"
                )

            },

            function () {

                $('#lokasiText').text("Lokasi tidak diizinkan")

            },

            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }

        )


        /* =========================
        AMBIL FOTO + GEOTAG
        ========================= */

        document.getElementById('ambilFoto').onclick = function () {

            if (!faceDetected) {
                alert("Wajah tidak terdeteksi")
                return
            }

            canvas.width = video.videoWidth
            canvas.height = video.videoHeight

            ctx.drawImage(video, 0, 0)


            /* background tag */

            ctx.fillStyle = "rgba(0,0,0,0.5)"
            ctx.fillRect(0, canvas.height - 90, canvas.width, 90)


            ctx.fillStyle = "white"
            ctx.font = "18px Arial"

            let waktu = new Date().toLocaleString()

            ctx.fillText("Waktu : " + waktu, 10, canvas.height - 60)
            ctx.fillText("Lat : " + latitude, 10, canvas.height - 35)
            ctx.fillText("Lng : " + longitude, 10, canvas.height - 15)


            fotoBase64 = canvas.toDataURL("image/jpeg", 0.7)

            preview.src = fotoBase64
            preview.classList.remove("hidden")

        }


        /* =========================
        SUBMIT AJAX
        ========================= */

        $('#formAbsensi').submit(function (e) {

            e.preventDefault()

            if (!fotoBase64) {
                alert("Ambil foto terlebih dahulu")
                return
            }

            if (!faceDetected) {
                alert("Wajah harus terlihat")
                return
            }

            $.ajax({

                url: "https://api.domain.com/api/absensi",

                method: "POST",

                data: {

                    nama: $('input[name=nama]').val(),
                    nik: $('input[name=nik]').val(),
                    foto: fotoBase64,

                    lat: latitude,
                    lng: longitude,
                    accuracy: accuracy,

                    geotag: {
                        lat: latitude,
                        lng: longitude,
                        accuracy: accuracy,
                        timestamp: Date.now()
                    }

                },

                success: function () {

                    alert("Absensi berhasil")
                    location.reload()

                },

                error: function () {

                    alert("Gagal kirim absensi")

                }

            })

        })

    </script>

</body>

</html>
