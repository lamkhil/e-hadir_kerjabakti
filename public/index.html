<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Absensi Kerja Bakti 6 Maret 2026</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        .fade-in {
            animation: fadeIn .6s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        video,
        img {
            transition: all .3s ease
        }

        /* Spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-lg fade-in">

        <!-- HEADER -->
        <div class="text-center mb-6">
            <img src="logo.jpeg" class="h-16 mx-auto mb-3">
            <h1 class="text-2xl font-bold text-gray-800">
                Absensi Kerja Bakti 6 Maret 2026
            </h1>
            <p class="text-gray-500 text-sm">
                Ambil foto dengan lokasi aktif
            </p>
        </div>

        <!-- PERMISSION WARNING -->
        <div id="permissionBox" class="hidden text-center mb-4">
            <div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg mb-3">
                Kamera atau lokasi belum diizinkan
            </div>
            <button id="btnPermission" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">
                Aktifkan Kamera & Lokasi
            </button>
        </div>

        <!-- FORM -->
        <form id="formAbsensi" class="space-y-4">
            <input type="hidden" name="lat">
            <input type="hidden" name="lng">
            <input type="hidden" name="accuracy">

            <div>
                <label class="text-sm font-medium">Nama</label>
                <input type="text" name="nama" class="w-full p-3 border rounded-lg" required>
            </div>

            <div>
                <label class="text-sm font-medium">NIK / NIP</label>
                <input type="text" name="nik" class="w-full p-3 border rounded-lg" required>
            </div>

            <div class="text-sm text-gray-500">
                📍 Lokasi: <span id="lokasiText">Mendeteksi...</span>
            </div>

            <div class="text-center">
                <video id="video" autoplay muted playsinline
                    class="rounded-xl border shadow w-full max-h-64 object-cover">
                </video>

                <canvas id="canvas" class="hidden"></canvas>

                <img id="preview" class="hidden rounded-xl border shadow w-full mt-3">

                <button type="button" id="ambilFoto"
                    class="mt-3 bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">
                    📸 Ambil Foto
                </button>
            </div>

            <button type="submit"
                class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700 font-semibold">
                Kirim Absensi
            </button>
        </form>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex flex-col items-center justify-center z-50">
        <div class="spinner mb-3"></div>
        <div class="text-white text-lg font-semibold animate-pulse">Mengirim data...</div>
    </div>

    <script>
        let latitude = null
        let longitude = null
        let accuracy = null
        let fotoBase64 = null
        let fotoDiambil = false

        const video = document.getElementById('video')
        const canvas = document.getElementById('canvas')
        const preview = document.getElementById('preview')
        const ctx = canvas.getContext('2d')

        const permissionBox = document.getElementById('permissionBox')
        const btnPermission = document.getElementById('btnPermission')

        function requestPermission() {
            initCamera()
            initLocation()
        }

        function initCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream
                    permissionBox.classList.add("hidden")
                })
                .catch(() => {
                    permissionBox.classList.remove("hidden")
                })
        }

        function initLocation() {
            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    latitude = pos.coords.latitude
                    longitude = pos.coords.longitude
                    accuracy = pos.coords.accuracy

                    $('input[name=lat]').val(latitude)
                    $('input[name=lng]').val(longitude)
                    $('input[name=accuracy]').val(accuracy)

                    $('#lokasiText').text(latitude + " , " + longitude + " (±" + accuracy + "m)")
                },
                function () {
                    permissionBox.classList.remove("hidden")
                    $('#lokasiText').text("Lokasi tidak diizinkan")
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            )
        }

        btnPermission.onclick = function () {
            requestPermission()
        }

        document.getElementById('ambilFoto').onclick = function () {
            if (!fotoDiambil) {
                if (!latitude) {
                    alert("Lokasi belum aktif")
                    return
                }

                canvas.width = video.videoWidth
                canvas.height = video.videoHeight
                ctx.drawImage(video, 0, 0)

                ctx.fillStyle = "rgba(0,0,0,0.5)"
                ctx.fillRect(0, canvas.height - 90, canvas.width, 90)

                ctx.fillStyle = "white"
                ctx.font = "18px Arial"

                let waktu = new Date().toLocaleString()
                ctx.fillText("Waktu : " + waktu, 10, canvas.height - 60)
                ctx.fillText("Lat : " + latitude, 10, canvas.height - 35)
                ctx.fillText("Lng : " + longitude, 10, canvas.height - 15)

                fotoBase64 = canvas.toDataURL("image/jpeg", 0.8)

                preview.src = fotoBase64
                preview.classList.remove("hidden")
                video.classList.add("hidden")
                this.innerText = "🔁 Ulangi Foto"
                fotoDiambil = true
            } else {
                preview.classList.add("hidden")
                video.classList.remove("hidden")
                fotoBase64 = null
                this.innerText = "📸 Ambil Foto"
                fotoDiambil = false
            }
        }

        $('#formAbsensi').submit(function (e) {
            e.preventDefault()

            if (!fotoBase64) {
                alert("Ambil foto terlebih dahulu")
                return
            }
            if (!latitude) {
                alert("GPS belum aktif")
                return
            }

            // Tampilkan overlay loading
            $('#loadingOverlay').removeClass('hidden')

            $.ajax({
                url: "https://attendance.dpmptsp-surabaya.my.id/api/store-presensi-kerja-bakti",
                method: "POST",
                data: {
                    nama: $('input[name=nama]').val(),
                    nik_nip: $('input[name=nik]').val(),
                    foto: fotoBase64,
                    latitude: latitude,
                    longitude: longitude,
                    accuracy: accuracy,
                    timestamp: Date.now(),
                    device: navigator.userAgent,
                    screen: screen.width + "x" + screen.height
                },
                success: function () {
                    alert("Absensi berhasil")
                    location.reload()
                },
                error: function () {
                    alert("Gagal kirim absensi")
                },
                complete: function () {
                    $('#loadingOverlay').addClass('hidden')
                }
            })
        })

        requestPermission()
    </script>

</body>

</html>
